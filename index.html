<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devlog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
      border-bottom: 1px solid #2d3748;
      padding: 28px 24px 22px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }

    header h1 span { color: #63b3ed; }

    header p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #718096;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 20px 16px 0;
      max-width: 800px;
      margin: 0 auto;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #2d3748;
      background: #1a202c;
      color: #718096;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .filter-btn:hover { border-color: #4a5568; color: #a0aec0; }

    .filter-btn.active {
      background: #2b4a7a;
      border-color: #63b3ed;
      color: #90cdf4;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }

    .timeline {
      position: relative;
      padding-left: 28px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, #63b3ed, #4a5568);
    }

    .log-entry {
      position: relative;
      margin-bottom: 28px;
    }

    .log-entry.hidden { display: none; }

    .log-entry::before {
      content: '';
      position: absolute;
      left: -24px;
      top: 16px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #63b3ed;
      border: 2px solid #0e1117;
      box-shadow: 0 0 0 3px rgba(99,179,237,0.25);
    }

    .log-card {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .log-card:hover { border-color: #4a5568; }

    .log-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      background: #1e2535;
      flex-wrap: wrap;
    }

    .log-date {
      background: #2d3748;
      color: #90cdf4;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .log-project-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .log-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #e2e8f0;
      flex: 1;
      min-width: 0;
    }

    .log-toggle {
      color: #4a5568;
      font-size: 1rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .log-entry.open .log-toggle { transform: rotate(180deg); }

    .log-body {
      display: none;
      padding: 14px 18px 18px;
      border-top: 1px solid #2d3748;
    }

    .log-entry.open .log-body { display: block; }

    .log-items {
      list-style: none;
      margin-bottom: 14px;
    }

    .log-items li {
      position: relative;
      padding-left: 14px;
      margin-bottom: 6px;
      font-size: 0.87rem;
      color: #cbd5e0;
      line-height: 1.55;
    }

    .log-items li::before {
      content: '•';
      position: absolute;
      left: 3px;
      color: #63b3ed;
      font-weight: 700;
    }

    .commits-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 7px;
    }

    .commits-list { display: flex; flex-direction: column; gap: 4px; }

    .commit-item {
      font-size: 0.78rem;
      color: #718096;
      font-family: 'Consolas', 'Monaco', monospace;
      padding: 4px 8px;
      background: #171c27;
      border-radius: 6px;
      border-left: 2px solid #2d3748;
    }

    .commit-item span { color: #4fd1c5; }

    .no-commits { font-size: 0.8rem; color: #4a5568; font-style: italic; }

    #loading {
      text-align: center;
      padding: 80px 0;
      color: #718096;
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #4a5568;
      font-size: 0.78rem;
      border-top: 1px solid #1a202c;
    }

    footer a { color: #63b3ed; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>Dev<span>log</span></h1>
    <p>프로젝트별 개발 작업 기록</p>
  </header>

  <div class="filter-bar" id="filter-bar"></div>

  <main>
    <div id="loading">로딩 중...</div>
    <div class="timeline" id="timeline" style="display:none"></div>
  </main>

  <footer>
    <a href="https://soondoree07.github.io/pokenova_project/" target="_blank">Pokenova</a> &nbsp;·&nbsp;
    <a href="https://github.com/soondoree07" target="_blank">GitHub</a>
  </footer>

  <script>
    // 프로젝트별 색상
    const PROJECT_COLORS = {
      pokenova: { bg: '#2d3b1f', border: '#68d391', text: '#9ae6b4' },
    };

    function getProjectColor(name) {
      if (PROJECT_COLORS[name]) return PROJECT_COLORS[name];
      // 새 프로젝트는 색상 자동 배정
      const palette = [
        { bg: '#2d1f3b', border: '#b794f4', text: '#d6bcfa' },
        { bg: '#1f2d3b', border: '#63b3ed', text: '#90cdf4' },
        { bg: '#3b2d1f', border: '#f6ad55', text: '#fbd38d' },
        { bg: '#3b1f2d', border: '#fc8181', text: '#feb2b2' },
        { bg: '#1f3b2d', border: '#4fd1c5', text: '#81e6d9' },
      ];
      const idx = [...name].reduce((a, c) => a + c.charCodeAt(0), 0) % palette.length;
      PROJECT_COLORS[name] = palette[idx];
      return PROJECT_COLORS[name];
    }

    let allEntries = [];
    let activeFilter = 'all';

    function applyFilter(project) {
      activeFilter = project;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.project === project);
      });
      document.querySelectorAll('.log-entry').forEach(entry => {
        const match = project === 'all' || entry.dataset.project === project;
        entry.classList.toggle('hidden', !match);
      });
    }

    function buildFilterBar(projects) {
      const bar = document.getElementById('filter-bar');
      const all = document.createElement('button');
      all.className = 'filter-btn active';
      all.dataset.project = 'all';
      all.textContent = '전체';
      all.addEventListener('click', () => applyFilter('all'));
      bar.appendChild(all);

      projects.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.project = name;
        btn.textContent = name;
        btn.addEventListener('click', () => applyFilter(name));
        bar.appendChild(btn);
      });
    }

    async function load() {
      const res = await fetch('logs.json');
      const logs = await res.json();

      const projects = [...new Set(logs.map(l => l.project).filter(Boolean))];
      buildFilterBar(projects);

      const timeline = document.getElementById('timeline');
      document.getElementById('loading').style.display = 'none';
      timeline.style.display = 'block';

      logs.forEach((log, i) => {
        const entry = document.createElement('div');
        entry.className = 'log-entry' + (i === 0 ? ' open' : '');
        entry.dataset.project = log.project || 'etc';

        const color = getProjectColor(log.project || 'etc');
        const badgeStyle = `background:${color.bg};border:1px solid ${color.border};color:${color.text}`;

        const itemsHtml = log.items.map(item => `<li>${item}</li>`).join('');

        let commitsHtml = '';
        if (log.commits && log.commits.length > 0) {
          const commitItems = log.commits.map(c => {
            const [hash, ...rest] = c.split(' - ');
            return `<div class="commit-item"><span>${hash}</span> — ${rest.join(' - ')}</div>`;
          }).join('');
          commitsHtml = `<div class="commits-label">Commits</div><div class="commits-list">${commitItems}</div>`;
        } else {
          commitsHtml = `<div class="commits-label">Commits</div><div class="no-commits">기록 없음</div>`;
        }

        entry.innerHTML = `
          <div class="log-card">
            <div class="log-header">
              <div class="log-date">${log.date}</div>
              <div class="log-project-badge" style="${badgeStyle}">${log.project || 'etc'}</div>
              <div class="log-title">${log.title}</div>
              <div class="log-toggle">▼</div>
            </div>
            <div class="log-body">
              <ul class="log-items">${itemsHtml}</ul>
              ${commitsHtml}
            </div>
          </div>
        `;

        entry.querySelector('.log-header').addEventListener('click', () => {
          entry.classList.toggle('open');
        });

        timeline.appendChild(entry);
      });
    }

    load().catch(err => {
      document.getElementById('loading').textContent = '로그를 불러오지 못했습니다.';
      console.error(err);
    });
  </script>
</body>
</html>
