<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devlog</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
      border-bottom: 1px solid #2d3748;
      padding: 28px 24px 0;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }

    header h1 span { color: #63b3ed; }

    header p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #718096;
    }

    /* 탭 네비게이션 */
    .tab-nav {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 20px;
    }

    .tab-btn {
      padding: 10px 32px;
      border: none;
      border-bottom: 3px solid transparent;
      background: transparent;
      color: #718096;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .tab-btn:hover { color: #a0aec0; }

    .tab-btn.active {
      color: #90cdf4;
      border-bottom-color: #63b3ed;
    }

    /* 필터바 */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 20px 16px 0;
      max-width: 800px;
      margin: 0 auto;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #2d3748;
      background: #1a202c;
      color: #718096;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .filter-btn:hover { border-color: #4a5568; color: #a0aec0; }

    .filter-btn.active {
      background: #2b4a7a;
      border-color: #63b3ed;
      color: #90cdf4;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }

    /* 탭 패널 */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── 로그 타임라인 ── */
    .timeline {
      position: relative;
      padding-left: 28px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 7px; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, #63b3ed, #4a5568);
    }

    .log-entry {
      position: relative;
      margin-bottom: 28px;
    }

    .log-entry.hidden { display: none; }

    .log-entry::before {
      content: '';
      position: absolute;
      left: -24px; top: 16px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #63b3ed;
      border: 2px solid #0e1117;
      box-shadow: 0 0 0 3px rgba(99,179,237,0.25);
    }

    .log-card {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .log-card:hover { border-color: #4a5568; }

    .log-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      background: #1e2535;
      flex-wrap: wrap;
    }

    .log-date {
      background: #2d3748;
      color: #90cdf4;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .log-project-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .log-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #e2e8f0;
      flex: 1;
      min-width: 0;
    }

    .log-toggle {
      color: #4a5568;
      font-size: 1rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .log-entry.open .log-toggle { transform: rotate(180deg); }

    .log-body {
      display: none;
      padding: 14px 18px 18px;
      border-top: 1px solid #2d3748;
    }

    .log-entry.open .log-body { display: block; }

    .log-items { list-style: none; margin-bottom: 14px; }

    .log-items li {
      position: relative;
      padding-left: 14px;
      margin-bottom: 6px;
      font-size: 0.87rem;
      color: #cbd5e0;
      line-height: 1.55;
    }

    .log-items li::before {
      content: '•';
      position: absolute;
      left: 3px;
      color: #63b3ed;
      font-weight: 700;
    }

    .commits-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 7px;
    }

    .commits-list { display: flex; flex-direction: column; gap: 4px; }

    .commit-item {
      font-size: 0.78rem;
      color: #718096;
      font-family: 'Consolas', 'Monaco', monospace;
      padding: 4px 8px;
      background: #171c27;
      border-radius: 6px;
      border-left: 2px solid #2d3748;
    }

    .commit-item span { color: #4fd1c5; }

    .no-commits { font-size: 0.8rem; color: #4a5568; font-style: italic; }

    /* ── 기획서 탭 ── */
    .specs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .specs-project-card {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 14px;
      overflow: hidden;
    }

    .specs-project-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: #1e2535;
      border-bottom: 1px solid #2d3748;
    }

    .specs-project-name {
      font-size: 0.9rem;
      font-weight: 700;
      flex: 1;
    }

    .specs-file-count {
      font-size: 0.72rem;
      color: #718096;
    }

    .specs-site-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.74rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid #2d3748;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    .specs-site-link:hover {
      background: rgba(255,255,255,0.12);
      border-color: #4a5568;
    }

    .specs-file-list { padding: 10px 12px; }

    .specs-file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .specs-file-item:hover { background: #2d3748; }

    .specs-file-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .specs-file-info { flex: 1; min-width: 0; }

    .specs-file-title {
      font-size: 0.87rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .specs-file-meta {
      font-size: 0.73rem;
      color: #718096;
      margin-top: 1px;
    }

    .specs-empty {
      padding: 20px;
      text-align: center;
      color: #4a5568;
      font-size: 0.82rem;
    }

    .specs-file-action {
      color: #4a5568;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .specs-file-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 0.95rem;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .specs-file-download:hover {
      background: #1a2332;
      color: #e2e8f0;
    }

    .specs-empty-hint {
      margin-top: 6px;
      font-size: 0.76rem;
      color: #2d3748;
      font-family: 'Consolas', monospace;
    }

    /* ── 마크다운 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      padding: 24px 16px;
      overflow-y: auto;
    }

    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    .modal-box {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 16px;
      width: 100%;
      max-width: 760px;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: #1e2535;
      border-bottom: 1px solid #2d3748;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      color: #e2e8f0;
      flex: 1;
    }

    .modal-close {
      background: none;
      border: none;
      color: #718096;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.1s;
    }

    .modal-close:hover { background: #2d3748; color: #e2e8f0; }

    .modal-content {
      padding: 24px 28px;
      max-height: 75vh;
      overflow-y: auto;
    }

    /* 마크다운 스타일 */
    .md-body { color: #cbd5e0; line-height: 1.75; font-size: 0.9rem; }
    .md-body h1 { font-size: 1.6rem; font-weight: 800; color: #e2e8f0; margin: 0 0 16px; padding-bottom: 10px; border-bottom: 2px solid #2d3748; }
    .md-body h2 { font-size: 1.25rem; font-weight: 700; color: #e2e8f0; margin: 24px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #2d3748; }
    .md-body h3 { font-size: 1rem; font-weight: 700; color: #90cdf4; margin: 18px 0 8px; }
    .md-body h4 { font-size: 0.9rem; font-weight: 700; color: #a0aec0; margin: 14px 0 6px; }
    .md-body p { margin-bottom: 12px; }
    .md-body ul, .md-body ol { padding-left: 20px; margin-bottom: 12px; }
    .md-body li { margin-bottom: 5px; }
    .md-body code { background: #171c27; color: #4fd1c5; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; font-family: 'Consolas', monospace; }
    .md-body pre { background: #171c27; border: 1px solid #2d3748; border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin-bottom: 14px; }
    .md-body pre code { background: none; padding: 0; color: #e2e8f0; }
    .md-body blockquote { border-left: 3px solid #63b3ed; padding-left: 14px; color: #a0aec0; margin: 12px 0; }
    .md-body table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 0.85rem; }
    .md-body th { background: #1e2535; color: #90cdf4; padding: 8px 12px; text-align: left; border-bottom: 2px solid #2d3748; }
    .md-body td { padding: 7px 12px; border-bottom: 1px solid #2d3748; }
    .md-body a { color: #63b3ed; text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid #2d3748; margin: 20px 0; }
    .md-body strong { color: #e2e8f0; font-weight: 700; }

    /* ── 로그 카드 클릭 가능 표시 ── */
    .log-title { cursor: pointer; transition: color 0.15s; }
    .log-title:hover { color: #90cdf4; text-decoration: underline; }

    /* ── 상세 페이지 ── */
    body.detail-mode .tab-nav,
    body.detail-mode .filter-bar,
    body.detail-mode #panel-log,
    body.detail-mode #panel-specs { display: none !important; }
    body:not(.detail-mode) #detail-view { display: none; }

    #detail-view main {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .detail-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .detail-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid #2d3748;
      background: #1a202c;
      color: #a0aec0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: all 0.15s;
    }
    .detail-btn:hover { background: #2d3748; color: #e2e8f0; border-color: #4a5568; }
    .detail-btn.copied { background: #1a3a2a; color: #68d391; border-color: #68d391; }

    .detail-pager {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      padding-top: 22px;
      border-top: 1px solid #2d3748;
    }

    .detail-pager-btn {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid #2d3748;
      background: #1a202c;
      color: #cbd5e0;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: all 0.15s;
      min-width: 0;
    }
    .detail-pager-btn:hover:not(:disabled) {
      background: #1e2535;
      border-color: #4a5568;
      color: #e2e8f0;
    }
    .detail-pager-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .detail-pager-btn.next { text-align: right; }
    .detail-pager-label {
      display: block;
      font-size: 0.7rem;
      color: #718096;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .detail-pager-title {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-header {
      background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 28px 30px 26px;
      margin-bottom: 28px;
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.78rem;
      color: #718096;
      letter-spacing: 0.4px;
      margin-bottom: 12px;
    }
    .detail-meta .dot { color: #4a5568; }
    .detail-project-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.5px;
    }

    .detail-title {
      font-size: 1.45rem;
      font-weight: 800;
      color: #f7fafc;
      line-height: 1.4;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .detail-desc {
      font-size: 0.95rem;
      color: #cbd5e0;
      line-height: 1.75;
      border-left: 3px solid #63b3ed;
      padding: 4px 0 4px 16px;
      white-space: pre-wrap;
    }

    .detail-section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: #4a5568;
      text-transform: uppercase;
      margin: 28px 0 10px;
    }

    .detail-body { padding: 0 4px; }

    .detail-fallback-note {
      margin-top: 18px;
      padding: 12px 16px;
      background: #1a202c;
      border: 1px dashed #2d3748;
      border-radius: 8px;
      color: #718096;
      font-size: 0.82rem;
      font-style: italic;
    }

    .detail-commits {
      margin-top: 28px;
      padding: 18px 22px;
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 12px;
    }

    #loading {
      text-align: center;
      padding: 80px 0;
      color: #718096;
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #4a5568;
      font-size: 0.78rem;
      border-top: 1px solid #1a202c;
    }

    footer a { color: #63b3ed; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>Dev<span>log</span></h1>
    <p>프로젝트별 개발 작업 기록</p>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="log">개발 로그</button>
      <button class="tab-btn" data-tab="specs">기획서</button>
    </nav>
  </header>

  <!-- 개발 로그 탭 -->
  <div id="panel-log" class="tab-panel active">
    <div class="filter-bar" id="filter-bar"></div>
    <main>
      <div id="loading">로딩 중...</div>
      <div class="timeline" id="timeline" style="display:none"></div>
    </main>
  </div>

  <!-- 기획서 탭 -->
  <div id="panel-specs" class="tab-panel">
    <main>
      <div id="specs-loading">로딩 중...</div>
      <div class="specs-grid" id="specs-grid" style="display:none"></div>
    </main>
  </div>

  <!-- 상세 페이지 -->
  <div id="detail-view">
    <main>
      <div class="detail-toolbar">
        <button class="detail-btn" id="detail-back">← 목록으로</button>
        <button class="detail-btn" id="detail-copy" title="이 항목 직접 링크 복사">🔗 링크 복사</button>
      </div>
      <div class="detail-header">
        <div class="detail-meta">
          <span id="detail-date"></span>
          <span class="dot">·</span>
          <span class="detail-project-badge" id="detail-project"></span>
        </div>
        <h2 class="detail-title" id="detail-title"></h2>
        <div class="detail-desc" id="detail-desc"></div>
      </div>
      <div class="detail-section-label">상세 내용</div>
      <div class="md-body detail-body" id="detail-body"></div>
      <div class="detail-commits" id="detail-commits"></div>
      <div class="detail-pager">
        <button class="detail-pager-btn prev" id="detail-prev" disabled>
          <span class="detail-pager-label">← 이전 (더 최근)</span>
          <span class="detail-pager-title" id="detail-prev-title">―</span>
        </button>
        <button class="detail-pager-btn next" id="detail-next" disabled>
          <span class="detail-pager-label">다음 (더 오래된) →</span>
          <span class="detail-pager-title" id="detail-next-title">―</span>
        </button>
      </div>
    </main>
  </div>

  <!-- 마크다운 모달 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-content">
        <div class="md-body" id="modal-body"></div>
      </div>
    </div>
  </div>

  <footer>
    <a href="https://pokenova.pochams.com" target="_blank">Pokenova</a> &nbsp;·&nbsp;
    <a href="https://pochams.com" target="_blank">Pochams</a> &nbsp;·&nbsp;
    <a href="https://soondoree07.github.io/jbae-portfolio/" target="_blank">jbae-portfolio</a> &nbsp;·&nbsp;
    <a href="https://github.com/soondoree07/junghyeok-portfolio" target="_blank">junghyeok-portfolio</a> &nbsp;·&nbsp;
    <a href="https://github.com/soondoree07" target="_blank">GitHub</a>
  </footer>

  <script>
    // ── 탭 전환 ──────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ── 프로젝트 색상 ─────────────────────────────────────────────
    const PROJECT_COLORS = {
      pokenova_project: { bg: '#2d3b1f', border: '#68d391', text: '#9ae6b4' },
      'junghyeok-portfolio': { bg: '#1a1f3b', border: '#b0e0ff', text: '#d6ecff' },
    };

    // ── 프로젝트별 라이브 사이트 (있는 것만) ───────────────────────
    const PROJECT_SITES = {
      pochams_project: 'https://pochams.com',
      pokenova_project: 'https://pokenova.pochams.com',
      jbae_portfolio: 'https://soondoree07.github.io/jbae-portfolio/',
      'maple-boss': 'https://maplebossparty.vercel.app',
    };

    function getProjectColor(name) {
      if (PROJECT_COLORS[name]) return PROJECT_COLORS[name];
      const palette = [
        { bg: '#2d1f3b', border: '#b794f4', text: '#d6bcfa' },
        { bg: '#1f2d3b', border: '#63b3ed', text: '#90cdf4' },
        { bg: '#3b2d1f', border: '#f6ad55', text: '#fbd38d' },
        { bg: '#3b1f2d', border: '#fc8181', text: '#feb2b2' },
        { bg: '#1f3b2d', border: '#4fd1c5', text: '#81e6d9' },
      ];
      const idx = [...name].reduce((a, c) => a + c.charCodeAt(0), 0) % palette.length;
      PROJECT_COLORS[name] = palette[idx];
      return PROJECT_COLORS[name];
    }

    // ── 개발 로그 ─────────────────────────────────────────────────
    let activeFilter = 'all';

    function applyFilter(project) {
      activeFilter = project;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.project === project);
      });
      document.querySelectorAll('.log-entry').forEach(entry => {
        const match = project === 'all' || entry.dataset.project === project;
        entry.classList.toggle('hidden', !match);
      });
    }

    function buildFilterBar(projects) {
      const bar = document.getElementById('filter-bar');
      const all = document.createElement('button');
      all.className = 'filter-btn active';
      all.dataset.project = 'all';
      all.textContent = '전체';
      all.addEventListener('click', () => applyFilter('all'));
      bar.appendChild(all);

      projects.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.project = name;
        btn.textContent = name;
        btn.addEventListener('click', () => applyFilter(name));
        bar.appendChild(btn);
      });
    }

    let LOGS = [];

    async function loadLogs() {
      const res = await fetch('logs.json');
      const logs = await res.json();
      LOGS = logs;

      const projects = [...new Set(logs.map(l => l.project).filter(Boolean))];
      buildFilterBar(projects);

      const timeline = document.getElementById('timeline');
      document.getElementById('loading').style.display = 'none';
      timeline.style.display = 'block';

      logs.forEach((log, i) => {
        const entry = document.createElement('div');
        entry.className = 'log-entry' + (i === 0 ? ' open' : '');
        entry.dataset.project = log.project || 'etc';

        const color = getProjectColor(log.project || 'etc');
        const badgeStyle = `background:${color.bg};border:1px solid ${color.border};color:${color.text}`;
        const itemsHtml = [...log.items].reverse().map(item => `<li>${item}</li>`).join('');

        let commitsHtml = '';
        if (log.commits && log.commits.length > 0) {
          const commitItems = [...log.commits].reverse().map(c => {
            const [hash, ...rest] = c.split(' - ');
            return `<div class="commit-item"><span>${hash}</span> — ${rest.join(' - ')}</div>`;
          }).join('');
          commitsHtml = `<div class="commits-label">Commits</div><div class="commits-list">${commitItems}</div>`;
        } else {
          commitsHtml = `<div class="commits-label">Commits</div><div class="no-commits">기록 없음</div>`;
        }

        entry.innerHTML = `
          <div class="log-card">
            <div class="log-header">
              <div class="log-date">${log.date}</div>
              <div class="log-project-badge" style="${badgeStyle}">${log.project || 'etc'}</div>
              <div class="log-title">${log.title}</div>
              <div class="log-toggle">▼</div>
            </div>
            <div class="log-body">
              <ul class="log-items">${itemsHtml}</ul>
              ${commitsHtml}
            </div>
          </div>
        `;

        entry.querySelector('.log-header').addEventListener('click', () => {
          entry.classList.toggle('open');
        });

        // 제목 클릭 → 상세페이지로
        const titleEl = entry.querySelector('.log-title');
        titleEl.addEventListener('click', (e) => {
          e.stopPropagation();
          openDetail(i);
        });

        timeline.appendChild(entry);
      });

      // 페이지 진입 시 hash가 있으면 자동으로 상세페이지 열기
      handleHashRoute();
    }

    // ── 상세 페이지 라우팅 ────────────────────────────────────────
    let CURRENT_IDX = -1;

    function openDetail(idx) {
      const log = LOGS[idx];
      if (!log) return;
      CURRENT_IDX = idx;

      document.body.classList.add('detail-mode');

      const color = getProjectColor(log.project || 'etc');
      const badgeStyle = `background:${color.bg};border:1px solid ${color.border};color:${color.text}`;

      document.getElementById('detail-date').textContent = log.date;
      const badge = document.getElementById('detail-project');
      badge.textContent = log.project || 'etc';
      badge.style.cssText = badgeStyle;
      document.getElementById('detail-title').textContent = log.title;
      document.getElementById('detail-desc').textContent = log.description || log.title;

      const body = document.getElementById('detail-body');
      if (log.details) {
        body.innerHTML = marked.parse(log.details);
      } else {
        const itemsHtml = log.items.map(item => `<li>${item}</li>`).join('');
        body.innerHTML = `<ul>${itemsHtml}</ul><div class="detail-fallback-note">이 작업은 상세 본문이 작성되지 않았습니다. 위 항목은 요약 카드와 동일한 내용입니다.</div>`;
      }

      const commitsEl = document.getElementById('detail-commits');
      if (log.commits && log.commits.length > 0) {
        const items = [...log.commits].reverse().map(c => {
          const [hash, ...rest] = c.split(' - ');
          return `<div class="commit-item"><span>${hash}</span> — ${rest.join(' - ')}</div>`;
        }).join('');
        commitsEl.innerHTML = `<div class="commits-label">Commits</div><div class="commits-list">${items}</div>`;
      } else {
        commitsEl.innerHTML = `<div class="commits-label">Commits</div><div class="no-commits">기록 없음</div>`;
      }

      // prev/next 버튼 업데이트 (LOGS는 최신이 위, 즉 idx-1이 더 최근)
      const prevBtn = document.getElementById('detail-prev');
      const nextBtn = document.getElementById('detail-next');
      const prevLog = idx > 0 ? LOGS[idx - 1] : null;
      const nextLog = idx < LOGS.length - 1 ? LOGS[idx + 1] : null;
      prevBtn.disabled = !prevLog;
      nextBtn.disabled = !nextLog;
      document.getElementById('detail-prev-title').textContent = prevLog ? prevLog.title : '―';
      document.getElementById('detail-next-title').textContent = nextLog ? nextLog.title : '―';

      window.scrollTo(0, 0);
      const target = '#log/' + idx;
      if (location.hash !== target) location.hash = target;
    }

    function closeDetail() {
      CURRENT_IDX = -1;
      document.body.classList.remove('detail-mode');
      if (location.hash) history.replaceState(null, '', location.pathname + location.search);
    }

    function handleHashRoute() {
      const m = location.hash.match(/^#log\/(\d+)$/);
      if (m) {
        const idx = parseInt(m[1], 10);
        if (idx >= 0 && idx < LOGS.length) openDetail(idx);
      } else {
        CURRENT_IDX = -1;
        document.body.classList.remove('detail-mode');
      }
    }

    document.getElementById('detail-back').addEventListener('click', closeDetail);
    document.getElementById('detail-prev').addEventListener('click', () => {
      if (CURRENT_IDX > 0) openDetail(CURRENT_IDX - 1);
    });
    document.getElementById('detail-next').addEventListener('click', () => {
      if (CURRENT_IDX >= 0 && CURRENT_IDX < LOGS.length - 1) openDetail(CURRENT_IDX + 1);
    });
    document.getElementById('detail-copy').addEventListener('click', async () => {
      const btn = document.getElementById('detail-copy');
      try {
        await navigator.clipboard.writeText(location.href);
        const originalText = btn.textContent;
        btn.textContent = '✓ 복사됨';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.remove('copied');
        }, 1500);
      } catch (e) {
        // 폴백: 보안 컨텍스트가 아니면 prompt로 노출
        prompt('아래 URL을 복사하세요:', location.href);
      }
    });

    // ESC 키로 목록 복귀
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.body.classList.contains('detail-mode')) {
        // 모달이 열려있으면 그건 모달 닫기 우선
        const modal = document.getElementById('modal-overlay');
        if (modal && modal.classList.contains('open')) return;
        closeDetail();
      }
    });

    window.addEventListener('hashchange', handleHashRoute);

    // ── 기획서 ────────────────────────────────────────────────────
    function fileIcon(type) {
      if (type === 'pdf') return '📄';
      if (type === 'md') return '📝';
      if (type === 'json') return '🗂️';
      if (type === 'docx' || type === 'doc') return '📃';
      return '📁';
    }

    async function openMarkdown(filePath, title) {
      try {
        const res = await fetch(filePath);
        if (!res.ok) throw new Error('파일을 불러올 수 없습니다.');
        const text = await res.text();
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-body').innerHTML = marked.parse(text);
        document.getElementById('modal-overlay').classList.add('open');
      } catch (e) {
        alert('파일을 불러오지 못했습니다: ' + e.message);
      }
    }

    async function openJson(filePath, title) {
      try {
        const res = await fetch(filePath);
        if (!res.ok) throw new Error('파일을 불러올 수 없습니다.');
        const data = await res.json();
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-body').innerHTML = renderJson(data);
        document.getElementById('modal-overlay').classList.add('open');
      } catch (e) {
        alert('파일을 불러오지 못했습니다: ' + e.message);
      }
    }

    function renderJson(data, depth = 0) {
      const indent = depth * 16;
      if (data === null) return '<span style="color:#fc8181">null</span>';
      if (typeof data === 'boolean') return `<span style="color:#f6ad55">${data}</span>`;
      if (typeof data === 'number') return `<span style="color:#68d391">${data}</span>`;
      if (typeof data === 'string') return `<span style="color:#90cdf4">"${escHtml(data)}"</span>`;
      if (Array.isArray(data)) {
        if (data.length === 0) return '<span style="color:#718096">[]</span>';
        const simple = data.every(v => typeof v !== 'object' || v === null);
        if (simple && data.length <= 6) {
          return '[' + data.map(v => renderJson(v, depth)).join('<span style="color:#4a5568">, </span>') + ']';
        }
        const items = data.map(v =>
          `<div style="margin-left:${indent + 16}px;margin-top:3px">${renderJson(v, depth + 1)}</div>`
        ).join('');
        return `<span style="color:#718096">[</span>${items}<div style="margin-left:${indent}px"><span style="color:#718096">]</span></div>`;
      }
      if (typeof data === 'object') {
        const keys = Object.keys(data);
        if (keys.length === 0) return '<span style="color:#718096">{}</span>';
        const items = keys.map(k => {
          const val = data[k];
          const isObj = val !== null && typeof val === 'object';
          return `<div style="margin-left:${indent + 16}px;margin-top:5px">
            <span style="color:#b794f4;font-weight:600">${escHtml(k)}</span><span style="color:#4a5568">: </span>${renderJson(val, depth + 1)}
          </div>`;
        }).join('');
        return `<div style="font-family:'Consolas',monospace;font-size:0.82rem;line-height:1.6">${items}</div>`;
      }
      return String(data);
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('modal-overlay').classList.remove('open');
    });

    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('open');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
    });

    async function loadSpecs() {
      const res = await fetch('specs.json');
      const specs = await res.json();

      const grid = document.getElementById('specs-grid');
      document.getElementById('specs-loading').style.display = 'none';
      grid.style.display = 'grid';

      const projects = Object.keys(specs);

      if (projects.length === 0) {
        grid.innerHTML = '<p style="color:#4a5568;text-align:center;padding:40px 0;">등록된 기획서가 없습니다.</p>';
        return;
      }

      projects.forEach(projectName => {
        const files = specs[projectName] || [];
        const color = getProjectColor(projectName);

        const card = document.createElement('div');
        card.className = 'specs-project-card';

        let filesHtml = '';
        if (files.length === 0) {
          filesHtml = `
            <div class="specs-empty">
              등록된 기획서가 없습니다
              <div class="specs-empty-hint">specs/${projectName}/ 폴더에 파일 추가 후 specs.json 업데이트</div>
            </div>`;
        } else {
          filesHtml = files.map(f => {
            const ext = (f.type || f.file.split('.').pop()).toLowerCase();
            const icon = fileIcon(ext);
            const safeTitle = f.title.replace(/'/g, "\\'");
            const meta = `${f.date || ''} · ${ext.toUpperCase()}`;

            const downloadName = f.file.split('/').pop();
            const downloadBtn = `<a class="specs-file-download" href="${f.file}" download="${downloadName}" title="다운로드" onclick="event.stopPropagation()">↓</a>`;

            if (ext === 'md') {
              return `
                <div class="specs-file-item" onclick="openMarkdown('${f.file}', '${safeTitle}')">
                  <span class="specs-file-icon">${icon}</span>
                  <div class="specs-file-info">
                    <div class="specs-file-title">${f.title}</div>
                    <div class="specs-file-meta">${meta}</div>
                  </div>
                  <span class="specs-file-action">열기 →</span>
                  ${downloadBtn}
                </div>`;
            } else if (ext === 'json') {
              return `
                <div class="specs-file-item" onclick="openJson('${f.file}', '${safeTitle}')">
                  <span class="specs-file-icon">${icon}</span>
                  <div class="specs-file-info">
                    <div class="specs-file-title">${f.title}</div>
                    <div class="specs-file-meta">${meta}</div>
                  </div>
                  <span class="specs-file-action">열기 →</span>
                  ${downloadBtn}
                </div>`;
            } else if (ext === 'docx' || ext === 'doc') {
              return `
                <a class="specs-file-item" href="${f.file}" download="${downloadName}">
                  <span class="specs-file-icon">${icon}</span>
                  <div class="specs-file-info">
                    <div class="specs-file-title">${f.title}</div>
                    <div class="specs-file-meta">${meta}</div>
                  </div>
                  <span class="specs-file-action">다운로드 ↓</span>
                </a>`;
            } else {
              return `
                <a class="specs-file-item" href="${f.file}" target="_blank">
                  <span class="specs-file-icon">${icon}</span>
                  <div class="specs-file-info">
                    <div class="specs-file-title">${f.title}</div>
                    <div class="specs-file-meta">${meta}</div>
                  </div>
                  <span class="specs-file-action">열기 →</span>
                  ${downloadBtn}
                </a>`;
            }
          }).join('');
        }

        const site = PROJECT_SITES[projectName];
        const siteLink = site
          ? `<a class="specs-site-link" href="${site}" target="_blank" rel="noopener" style="color:${color.text}" onclick="event.stopPropagation()">🔗 사이트 열기</a>`
          : '';

        card.innerHTML = `
          <div class="specs-project-header">
            <div class="specs-project-name" style="color:${color.text}">${projectName}</div>
            ${siteLink}
            <div class="specs-file-count">${files.length}개 파일</div>
          </div>
          <div class="specs-file-list">${filesHtml}</div>
        `;

        grid.appendChild(card);
      });
    }

    // 로드
    loadLogs().catch(err => {
      document.getElementById('loading').textContent = '로그를 불러오지 못했습니다.';
      console.error(err);
    });

    loadSpecs().catch(err => {
      document.getElementById('specs-loading').textContent = '기획서를 불러오지 못했습니다.';
      console.error(err);
    });
  </script>
</body>
</html>
